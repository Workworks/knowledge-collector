spring:
  application:
    name: knowledge-collector
  datasource:
    url: jdbc:h2:file:${KNOWLEDGE_COLLECTOR_DATA_DIR:./data}/database/knowledge-collector;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: false
  thymeleaf:
    cache: false
  mvc:
    problemdetails:
      enabled: false

server:
  address: ${KNOWLEDGE_COLLECTOR_SERVER_ADDRESS:127.0.0.1}
  port: ${KNOWLEDGE_COLLECTOR_SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
  servlet:
    session:
      timeout: ${KNOWLEDGE_COLLECTOR_SESSION_TIMEOUT:8h}
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: never

knowledge-collector:
  security:
    enabled: ${KNOWLEDGE_COLLECTOR_SECURITY_ENABLED:true}
    initial-admin-username: ${KNOWLEDGE_COLLECTOR_INITIAL_ADMIN_USERNAME:}
    initial-admin-password: ${KNOWLEDGE_COLLECTOR_INITIAL_ADMIN_PASSWORD:}
  storage:
    root: ${KNOWLEDGE_COLLECTOR_DATA_DIR:./data}
    minio:
      enabled: ${KNOWLEDGE_COLLECTOR_MINIO_ENABLED:false}
      endpoint: ${KNOWLEDGE_COLLECTOR_MINIO_ENDPOINT:http://127.0.0.1:9000}
      bucket: ${KNOWLEDGE_COLLECTOR_MINIO_BUCKET:knowledge-collector}
      access-key: ${KNOWLEDGE_COLLECTOR_MINIO_ACCESS_KEY:}
      secret-key: ${KNOWLEDGE_COLLECTOR_MINIO_SECRET_KEY:}
  tasks:
    stale-timeout: ${KNOWLEDGE_COLLECTOR_TASK_STALE_TIMEOUT:PT10M}
  network:
    enabled: true
    trust-system-store: ${KNOWLEDGE_COLLECTOR_TRUST_SYSTEM_STORE:true}
    additional-ca-file: ${KNOWLEDGE_COLLECTOR_ADDITIONAL_CA_FILE:}
  ai:
    provider: ${KNOWLEDGE_COLLECTOR_AI_PROVIDER:ollama}
    max-content-chars: ${KNOWLEDGE_COLLECTOR_AI_MAX_CONTENT_CHARS:24000}
    ollama:
      enabled: ${KNOWLEDGE_COLLECTOR_OLLAMA_ENABLED:true}
      base-url: ${KNOWLEDGE_COLLECTOR_OLLAMA_BASE_URL:http://127.0.0.1:11434}
      model: ${KNOWLEDGE_COLLECTOR_OLLAMA_MODEL:deepseek-r1:14b}
      timeout: ${KNOWLEDGE_COLLECTOR_OLLAMA_TIMEOUT:PT2M}
    chat:
      max-history-messages: ${KNOWLEDGE_COLLECTOR_AI_CHAT_MAX_HISTORY:20}
  search:
    searxng:
      enabled: ${KNOWLEDGE_COLLECTOR_SEARXNG_ENABLED:false}
      base-url: ${KNOWLEDGE_COLLECTOR_SEARXNG_BASE_URL:http://127.0.0.1:8088}
  extraction:
    firecrawl:
      enabled: ${KNOWLEDGE_COLLECTOR_FIRECRAWL_ENABLED:false}
      base-url: ${KNOWLEDGE_COLLECTOR_FIRECRAWL_BASE_URL:http://127.0.0.1:3002}
      api-key: ${KNOWLEDGE_COLLECTOR_FIRECRAWL_API_KEY:}
    playwright:
      enabled: ${KNOWLEDGE_COLLECTOR_PLAYWRIGHT_ENABLED:false}
      base-url: ${KNOWLEDGE_COLLECTOR_PLAYWRIGHT_BASE_URL:http://127.0.0.1:3003}
  advanced:
    tika-url: ${KNOWLEDGE_COLLECTOR_TIKA_URL:http://127.0.0.1:9998}
    qdrant-url: ${KNOWLEDGE_COLLECTOR_QDRANT_URL:http://127.0.0.1:6333}
    grafana-url: ${KNOWLEDGE_COLLECTOR_GRAFANA_URL:http://127.0.0.1:3000}
    ntfy-url: ${KNOWLEDGE_COLLECTOR_NTFY_URL:http://127.0.0.1:8085}
    n8n-url: ${KNOWLEDGE_COLLECTOR_N8N_URL:http://127.0.0.1:5678}
    langfuse-url: ${KNOWLEDGE_COLLECTOR_LANGFUSE_URL:http://127.0.0.1:3001}
    crossref-url: ${KNOWLEDGE_COLLECTOR_CROSSREF_URL:https://api.crossref.org}
logging:
  config: classpath:logback-spring.xml

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
