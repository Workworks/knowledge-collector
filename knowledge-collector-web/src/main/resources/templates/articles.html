<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>文章库</title><link rel="stylesheet" href="/css/app.css"></head>
<body><main class="container"><h1>文章库</h1>
<p class="notice">这里展示 RSS/Atom 采集形成的文章元数据，数据直接来自数据库。</p>
<table><thead><tr><th>ID</th><th>标题</th><th>采集源</th><th>发布时间</th></tr></thead>
<tbody><tr th:each="article : ${articles}">
<td th:text="${article.id}"></td>
<td><a th:href="@{/articles/{id}(id=${article.id})}" th:text="${article.title}"></a></td>
<td th:text="${article.sourceName}"></td><td th:text="${article.publishTime}"></td>
</tr></tbody></table>
<p th:if="${#lists.isEmpty(articles)}">暂无文章，请先到采集源页面执行一次采集。</p>
<a class="button button-secondary" href="/sources">采集源</a>
<a class="button button-secondary" href="/tasks">采集任务</a>
</main></body></html>
