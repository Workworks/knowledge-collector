<!doctype html><html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>文件与快照 · Knowledge Collector</title><link rel="stylesheet" href="/css/app.css"><script defer src="/js/admin-common.js"></script><script defer src="/js/evidence-files.js"></script></head><body>
<nav th:replace="~{fragments/navigation :: siteNav('evidence-files')}"></nav><main class="container admin-container" th:attr="data-owner-type=${ownerType},data-owner-id=${ownerId}"><div id="page-message" class="page-message" hidden></div><header class="page-hero compact-hero"><div><p class="eyebrow">STAGE 29 · MINIO EVIDENCE</p><h1>文件与快照</h1><p class="lead">统一查看原始网页、网页快照、附件和补充材料；同一对象同一类型自动递增版本。</p></div><a class="button button-secondary" href="/capabilities">配置 MinIO</a></header>
<section class="console-panel"><h2>上传补充材料</h2><form id="evidence-form" class="filter-grid"><label>归属类型<select id="owner-type"><option>ARTICLE</option><option>CARD</option><option>CLAIM</option><option>DRAFT</option><option>GENERAL</option></select></label><label>归属 ID<input id="owner-id" type="number" min="1" required placeholder="例如：550"></label><label>文件类型<select id="file-kind"><option value="SUPPLEMENT">补充材料</option><option value="ATTACHMENT">原始附件</option><option value="RAW_HTML">原始网页</option><option value="SCREENSHOT">网页快照</option></select></label><label class="filter-wide">选择文件<input id="evidence-file" type="file" required></label><button class="button button-primary" type="submit">上传到 MinIO</button></form></section>
<section class="console-panel"><div class="section-heading"><h2>文件清单与版本</h2><button id="evidence-refresh" class="button button-secondary">刷新</button></div><div class="table-wrap"><table><thead><tr><th>归属</th><th>类型</th><th>文件</th><th>版本</th><th>大小/校验</th><th>时间</th><th>操作</th></tr></thead><tbody id="evidence-rows"></tbody></table></div><div id="evidence-empty" class="empty-state">暂无文件。</div></section></main></body></html>
