<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>任务详情 · Knowledge Collector</title><link rel="stylesheet" href="/css/app.css">
<script defer src="/js/admin-common.js"></script><script defer src="/js/task-detail.js"></script></head><body>
<nav class="site-nav"><a class="brand" href="/">KC <span>Knowledge Collector</span></a><div class="nav-links">
<a href="/sources">采集员</a><a class="active" href="/tasks">任务</a><a href="/articles">资料库</a></div></nav>
<main class="container admin-container" data-task-id="" th:attr="data-task-id=${taskId}"
      xmlns:th="http://www.thymeleaf.org"><header class="page-hero compact-hero"><div><p class="eyebrow">TASK DETAIL</p>
<h1 id="task-title">任务详情</h1><p class="lead">采集员：<span id="task-source">加载中</span></p></div>
<div class="header-actions"><button id="retry-task" class="button button-primary" hidden>重试失败任务</button>
<a class="button button-secondary" href="/tasks">返回任务列表</a></div></header><div id="page-message" class="page-message" hidden></div>
<section class="metric-grid"><article><span>状态</span><strong id="task-status">—</strong></article><article><span>触发方式</span><strong id="task-trigger">—</strong></article><article><span>发现</span><strong id="task-discovered">0</strong></article>
<article><span>新增</span><strong id="task-created">0</strong></article><article><span>重复</span><strong id="task-duplicates">0</strong></article>
<article><span>耗时</span><strong id="task-duration">—</strong></article></section>
<section class="console-panel"><h2>任务项</h2><div class="table-wrap"><table><thead><tr><th>ID</th><th>结果</th><th>规范化地址</th><th>文章</th></tr></thead>
<tbody id="task-items"></tbody></table></div><div id="task-item-empty" class="empty-state" hidden>该任务没有任务项。</div></section></main></body></html>
