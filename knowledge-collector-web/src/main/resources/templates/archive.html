<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>归档资料库 · Knowledge Collector</title><link rel="stylesheet" href="/css/app.css">
<script defer src="/js/admin-common.js"></script><script defer src="/js/archive.js"></script></head><body>
<nav class="site-nav"><a class="brand" href="/">KC <span>Knowledge Collector</span></a><div class="nav-links"><a href="/topics">主题</a><a href="/sources">采集员</a><a href="/tasks">任务</a><a href="/articles">资料库</a><a class="active" href="/articles/archive">归档库</a></div></nav>
<main class="container admin-container"><header class="page-hero compact-hero"><div><p class="eyebrow">ARCHIVE LIBRARY</p><h1>归档资料库</h1><p class="lead">查看已经归档的文章，并用可配置规则整理长期资料。</p></div><div class="hero-stat"><strong id="archive-count">0 篇资料</strong><span>当前整理结果</span></div></header>
<div id="page-message" class="page-message" hidden></div>
<section class="archive-layout"><aside class="console-panel archive-rules"><div class="section-heading"><div><h2>整理规则</h2><p>按关键词、主题、来源和质量组织归档。</p></div><button id="rule-new" class="button button-primary button-small">新增</button></div>
<button class="archive-rule active" data-rule="all"><strong>全部归档</strong><span>不限制整理条件</span></button><div id="archive-rule-list"></div>
<form id="archive-rule-form" class="admin-form compact-form" hidden><input id="rule-id" type="hidden"><div class="form-field"><label for="rule-name">规则名称</label><input id="rule-name" required maxlength="128"></div>
<div class="form-field"><label for="rule-keyword">关键词</label><input id="rule-keyword" maxlength="200"></div><div class="form-field"><label for="rule-topic">主题</label><select id="rule-topic"><option value="">不限</option></select></div>
<div class="form-field"><label for="rule-source">来源</label><select id="rule-source"><option value="">不限</option></select></div><div class="form-field"><label for="rule-quality">最低质量</label><input id="rule-quality" type="number" min="0" max="100"></div>
<div class="form-field"><label for="rule-order">顺序</label><input id="rule-order" type="number" value="0"></div><label class="check-field"><input id="rule-enabled" type="checkbox" checked> 启用规则</label>
<div class="action-row"><button class="button button-primary" type="submit">保存规则</button><button id="rule-cancel" class="button button-secondary" type="button">取消</button></div></form></aside>
<section><div id="archive-active" class="archive-active"><strong>全部归档</strong><span>展示所有已归档资料</span></div><div id="archive-grid" class="library-grid"></div><div id="archive-empty" class="empty-state empty-card" hidden>当前规则下没有归档资料。</div>
<div class="pagination"><button id="archive-prev" class="button button-secondary">上一页</button><span id="archive-page">第 1 页</span><button id="archive-next" class="button button-secondary">下一页</button></div></section></section></main></body></html>
