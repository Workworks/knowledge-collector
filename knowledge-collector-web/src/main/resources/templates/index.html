<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Knowledge Collector</title>
    <link rel="icon" href="/favicon.ico" type="image/svg+xml">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="site-nav"><a class="brand" href="/">KC <span>Knowledge Collector</span></a><div class="nav-links">
    <a href="/topics">主题</a><a href="/sources">采集员</a><a href="/tasks">任务</a>
    <a href="/articles">资料库</a><a href="/test-console">接口测试</a></div></nav>
<main class="container">
    <header class="page-hero">
        <div>
        <p class="eyebrow">KNOWLEDGE COLLECTOR</p>
        <h1>把信息流，变成你的知识库。</h1>
        <p class="lead">从主题规划、采集员执行、质量筛选到阅读笔记，在一个本地工作台里完成。</p>
        <nav class="header-actions" aria-label="快捷入口">
            <a class="button button-primary" href="/articles">进入资料库</a>
            <a class="button button-secondary" href="/sources">管理采集员</a>
        </nav>
        </div>
        <div class="hero-stat"><strong>Stage 8</strong><span>资料库与阅读闭环</span></div>
    </header>

    <section class="status-grid" aria-label="系统状态">
        <article>
            <h2>应用版本</h2>
            <p th:text="${status.applicationVersion}">1.0.0</p>
        </article>
        <article>
            <h2>数据库</h2>
            <p th:text="${status.databaseProduct + ' ' + status.databaseVersion}">H2</p>
        </article>
        <article>
            <h2>Flyway 迁移</h2>
            <p th:text="${status.flywayMigrationCount}">1</p>
        </article>
        <article>
            <h2>累计启动</h2>
            <p th:text="${status.startupCount}">1</p>
        </article>
    </section>

    <section class="details">
        <h2>基础设施状态</h2>
        <dl>
            <div><dt>数据目录</dt><dd th:text="${status.dataDirectory}">./data</dd></div>
            <div><dt>最近启动</dt><dd th:text="${status.lastStartedAt}">-</dd></div>
            <div><dt>状态 API</dt><dd><a href="/api/v1/system/status">/api/v1/system/status</a></dd></div>
            <div><dt>健康检查</dt><dd><a href="/actuator/health">/actuator/health</a></dd></div>
            <div><dt>测试工具</dt><dd><a href="/test-console">Web 接口测试台</a></dd></div>
        </dl>
    </section>
</main>
</body>
</html>
