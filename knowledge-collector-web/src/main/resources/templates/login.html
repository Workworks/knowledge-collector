<!doctype html><html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>登录 · Knowledge Collector</title><link rel="stylesheet" href="/css/app.css"></head><body class="auth-body"><main class="auth-card"><div class="auth-brand">KC</div><p class="eyebrow">KNOWLEDGE COLLECTOR</p><h1>登录知识工作台</h1><p>使用管理员分配的用户名和密码。</p><div class="auth-error" th:if="${param.error}">用户名或密码错误、账号已停用，或尝试次数过多。</div><div class="auth-success" th:if="${param.logout}">已安全退出登录。</div><form method="post" th:action="@{/login}" id="login-form"><label>用户名<input name="username" autocomplete="username" required autofocus></label><label>密码<input name="password" type="password" autocomplete="current-password" required></label><button class="button primary" id="login-button">登录</button></form></main><script src="/js/login.js"></script></body></html>
